<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stencil Web Components Demo</title>
  <style>
    /* Inline design tokens for standalone HTML demo */
    :root {
      --color-primary: #3b82f6;
      --color-primary-hover: #2563eb;
      --color-secondary: #64748b;
      --color-secondary-hover: #475569;
      --color-success: #22c55e;
      --color-warning: #f59e0b;
      --color-error: #ef4444;
      --bg: #ffffff;
      --bg-secondary: #f8fafc;
      --text: #0f172a;
      --text-secondary: #64748b;
      --text-muted: #94a3b8;
      --border-color: #e2e8f0;
      --border-width: 1px;
      --spacing-xs: 0.25rem;
      --spacing-sm: 0.5rem;
      --spacing-md: 1rem;
      --spacing-lg: 1.5rem;
      --spacing-xl: 2rem;
      --radius-sm: 0.25rem;
      --radius-md: 0.375rem;
      --radius-lg: 0.5rem;
      --radius-full: 9999px;
      --font-size-xs: 0.75rem;
      --font-size-sm: 0.875rem;
      --font-size-md: 1rem;
      --font-size-lg: 1.125rem;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      --transition-fast: 150ms ease;
      --transition-base: 200ms ease;
    }

    [data-theme="dark"] {
      --bg: #0f172a;
      --bg-secondary: #1e293b;
      --text: #f8fafc;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --border-color: #334155;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: var(--font-size-md);
      padding: 2rem;
      transition: background-color var(--transition-base), color var(--transition-base);
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border-color);
    }
    h1 { font-size: 1.5rem; font-weight: 700; }
    h2 { font-size: 1.25rem; font-weight: 600; margin-bottom: 1rem; }
    main { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 2rem; }
    section { display: flex; flex-direction: column; gap: 0.75rem; }
    .row { display: flex; flex-wrap: wrap; gap: 0.75rem; }
    .col { display: flex; flex-direction: column; gap: 1rem; max-width: 400px; }

    /* Base component styles for web components */
    button {
      display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
      font-family: inherit; font-weight: 500; border-radius: var(--radius-md);
      border: 1px solid transparent; cursor: pointer;
      transition: all var(--transition-base);
    }
    button:focus-visible { outline: 2px solid var(--color-primary); outline-offset: 2px; }
    button:disabled { pointer-events: none; opacity: 0.5; }
    .btn-primary { background: var(--color-primary); color: white; padding: 0.5rem 1rem; }
    .btn-primary:hover { background: var(--color-primary-hover); }
    .btn-ghost { background: transparent; color: var(--text); border-color: var(--border-color); padding: 0.5rem 1rem; }
    .btn-ghost:hover { background: var(--bg-secondary); }

    input, select {
      display: block; width: 100%; padding: 0.5rem 0.75rem;
      border: 1px solid var(--border-color); border-radius: var(--radius-md);
      background: var(--bg); color: var(--text); font-family: inherit; font-size: inherit;
    }
    input:focus, select:focus {
      outline: none; border-color: var(--color-primary);
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--color-primary) 20%, transparent);
    }
    label { font-size: var(--font-size-sm); font-weight: 500; color: var(--text); }
    .field { display: flex; flex-direction: column; gap: 0.375rem; }
    .helper { font-size: var(--font-size-sm); color: var(--text-muted); }
    .error-text { font-size: var(--font-size-sm); color: var(--color-error); }
    .checkbox-row { display: flex; align-items: center; gap: 0.5rem; }
    input[type="checkbox"] { width: 1rem; height: 1rem; accent-color: var(--color-primary); }
  </style>
</head>
<body>
  <header>
    <h1>🌐 Stencil Web Components Demo</h1>
    <button class="btn-ghost" id="theme-toggle" onclick="toggleTheme()">🌙 Dark</button>
  </header>

  <main>
    <section>
      <h2>Buttons</h2>
      <div class="row">
        <button class="btn-primary">Primary</button>
        <button style="background:var(--color-secondary);color:white;padding:0.5rem 1rem;">Secondary</button>
        <button style="background:var(--color-success);color:white;padding:0.5rem 1rem;">Success</button>
        <button style="background:var(--color-warning);color:white;padding:0.5rem 1rem;">Warning</button>
        <button style="background:var(--color-error);color:white;padding:0.5rem 1rem;">Danger</button>
        <button class="btn-ghost">Ghost</button>
      </div>
    </section>

    <section>
      <h2>Input</h2>
      <div class="col">
        <div class="field">
          <label for="email">Email address</label>
          <input id="email" type="email" placeholder="you@example.com" />
          <span class="helper">We'll never share your email.</span>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="Min 8 characters" style="border-color:var(--color-error)" />
          <span class="error-text" role="alert">Password is too short.</span>
        </div>
      </div>
    </section>

    <section>
      <h2>Select</h2>
      <div class="col">
        <div class="field">
          <label for="framework">Favorite framework</label>
          <select id="framework">
            <option value="" disabled selected>Choose a framework…</option>
            <option value="react">React</option>
            <option value="angular">Angular</option>
            <option value="vue">Vue</option>
            <option value="svelte">Svelte</option>
          </select>
          <span class="helper">Pick your favorite JavaScript framework.</span>
        </div>
      </div>
    </section>

    <section>
      <h2>Checkbox</h2>
      <div class="col">
        <label class="checkbox-row">
          <input type="checkbox" />
          <span>I agree to the terms and conditions</span>
        </label>
        <label class="checkbox-row">
          <input type="checkbox" />
          <span>Subscribe to newsletter</span>
        </label>
        <label class="checkbox-row">
          <input type="checkbox" id="indeterminate-cb" />
          <span>Indeterminate state</span>
        </label>
        <label class="checkbox-row" style="opacity:0.5;pointer-events:none;">
          <input type="checkbox" disabled />
          <span>Disabled checkbox</span>
        </label>
      </div>
    </section>
  </main>

  <script>
    // Set indeterminate state
    document.getElementById('indeterminate-cb').indeterminate = true;

    let dark = false;
    function toggleTheme() {
      dark = !dark;
      document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
      document.getElementById('theme-toggle').textContent = dark ? '☀️ Light' : '🌙 Dark';
    }
  </script>
</body>
</html>
